<!doctype html>
<html lang="pl">
<head>
<meta charset="utf-8">
<meta http-equiv="Content-Type" content="text/html; charset=utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Manevision — AI dla kliniki kosmetologicznej</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;400i;500i&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    /* warm + bright palette */
    --bg:        #FBF4E8;   /* warm cream */
    --bg-soft:   #F5E6D3;   /* peach */
    --card:      #FFFFFF;
    --ink:       #2A1810;   /* warm brown-black */
    --ink-2:     #6B5544;
    --muted:     #9C8A78;
    --terra:     #D2664A;   /* terracotta — primary CTA */
    --terra-d:   #B85638;   /* hover */
    --rose:      #E89B8E;
    --gold:      #B08D57;
    --border:    #ECDFCE;

    --serif:     "Playfair Display", Georgia, serif;
    --sans:      "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    --mono:      ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    --maxw:      1140px;
    --pad-y:     120px;
  }

  *,*::before,*::after{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg);
    color:var(--ink);
    font-family:var(--sans);
    font-size:16px;
    line-height:1.5;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
    overflow-x:hidden;
  }
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--terra);color:#fff}

  .wrap{
    max-width:var(--maxw);
    margin:0 auto;
    padding:0 32px;
    position:relative;
  }

  /* ───────── Top bar ───────── */
  .topbar{
    position:absolute;
    inset:32px 0 auto 0;
    z-index:10;
  }
  .topbar .wrap{
    display:flex;
    align-items:center;
    justify-content:space-between;
  }
  .wordmark{
    font-family:var(--sans);
    font-weight:600;
    font-size:14px;
    letter-spacing:0.18em;
    color:var(--gold);
    text-transform:uppercase;
  }
  .lang{
    display:flex;
    gap:18px;
    font-size:13px;
    letter-spacing:0.06em;
    color:var(--ink-2);
  }
  .lang button{
    background:none;border:0;padding:2px 0;
    font:inherit;color:inherit;cursor:pointer;
    letter-spacing:inherit;
    text-transform:uppercase;
  }
  .lang button.is-active{
    color:var(--ink);
    font-weight:600;
    border-bottom:1.5px solid var(--terra);
  }
  .lang button:hover{color:var(--ink)}

  /* ───────── Hero ───────── */
  .hero{
    position:relative;
    min-height:100vh;
    display:flex;
    align-items:center;
    padding:160px 0 100px;
    overflow:hidden;
    /* warm radial wash */
    background:
      radial-gradient(900px 600px at 85% 20%, rgba(232,155,142,.30), transparent 60%),
      radial-gradient(700px 500px at 10% 90%, rgba(212,160,79,.22), transparent 60%),
      var(--bg);
  }

  /* Background chat — fragments of correspondence */
  .bg-chat{
    position:absolute;
    inset:0;
    pointer-events:none;
    z-index:1;
  }
  .bg-bubble{
    position:absolute;
    max-width:280px;
    padding:12px 16px;
    font-size:14px;
    line-height:1.45;
    border-radius:20px;
    color:#fff;
    opacity:.42;
    transform-origin:center;
    box-sizing:border-box;
  }
  .bg-bubble.bot{
    background:#fff;
    color:var(--ink);
    border:1px solid var(--border);
    opacity:.55;
    border-bottom-left-radius:6px;
  }
  .bg-bubble.cli{
    background:linear-gradient(135deg, #F58EA7 0%, #C66EE0 50%, #8E5BE0 100%);
    border-bottom-right-radius:6px;
  }

  /* positions: scattered like a real chat scroll, top-right + bottom-left */
  .b1{ top:14%;  right:-40px; transform:rotate(4deg);  max-width:240px; }
  .b2{ top:26%;  right:12%;   transform:rotate(-3deg); max-width:300px; }
  .b3{ top:42%;  right:-20px; transform:rotate(2deg);  max-width:220px; }
  .b4{ bottom:18%; left:-30px; transform:rotate(-4deg); max-width:230px; }
  .b5{ bottom:6%;  left:14%;   transform:rotate(3deg);  max-width:280px; }
  .b6{ top:60%;   left:8%;    transform:rotate(-2deg); max-width:200px; }

  /* warm wash overlay so text reads crisp */
  .hero::after{
    content:"";
    position:absolute;
    inset:0;
    background:
      linear-gradient(95deg, rgba(251,244,232,.96) 0%, rgba(251,244,232,.7) 40%, rgba(251,244,232,.2) 75%, rgba(251,244,232,0) 100%);
    z-index:2;
    pointer-events:none;
  }
  .hero-inner{
    position:relative;
    z-index:3;
    max-width:720px;
  }

  .eyebrow{
    display:inline-flex;
    align-items:center;
    gap:8px;
    padding:7px 14px 7px 10px;
    background:#fff;
    border:1px solid var(--border);
    border-radius:999px;
    font-size:12px;
    font-weight:500;
    letter-spacing:0.08em;
    text-transform:uppercase;
    color:var(--ink-2);
    margin-bottom:28px;
  }
  .live-dot{
    width:8px;height:8px;border-radius:50%;
    background:#2DD36F;
    box-shadow:0 0 0 0 rgba(45,211,111,.6);
    animation:pulse 1.8s ease-out infinite;
  }
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(45,211,111,.55)}
    70%{box-shadow:0 0 0 8px rgba(45,211,111,0)}
    100%{box-shadow:0 0 0 0 rgba(45,211,111,0)}
  }

  h1.hero-h{
    font-family:var(--serif);
    font-weight:400;
    font-size:64px;
    line-height:1.08;
    letter-spacing:-0.015em;
    margin:0 0 28px;
    color:var(--ink);
    text-wrap:balance;
  }
  h1.hero-h em{
    font-style:italic;
    font-weight:500;
    color:var(--terra);
  }
  .hero-sub{
    font-size:20px;
    line-height:1.55;
    color:var(--ink-2);
    max-width:560px;
    margin:0 0 40px;
  }
  .micro{
    font-size:14px;
    color:var(--muted);
    margin:18px 0 0;
  }

  /* ───────── CTA button ───────── */
  .btn{
    display:inline-flex;
    align-items:center;
    gap:12px;
    background:var(--terra);
    color:#fff;
    font-family:var(--sans);
    font-size:18px;
    font-weight:500;
    letter-spacing:0.04em;
    padding:20px 36px;
    border-radius:10px;
    border:0;
    cursor:pointer;
    transition:transform .18s ease, background .18s ease;
    white-space:nowrap;
  }
  .btn:hover{
    transform:translateY(-2px);
    background:var(--terra-d);
  }
  .btn .arrow{
    display:inline-block;
    transition:transform .18s ease;
  }
  .btn:hover .arrow{transform:translateX(4px)}

  /* ───────── Hero CTA row with QR ───────── */
  .cta-row{
    display:flex;
    align-items:center;
    gap:20px;
    flex-wrap:wrap;
  }
  .qr-card{
    display:flex;
    align-items:center;
    gap:14px;
    padding:12px 18px 12px 12px;
    background:#fff;
    border:1px solid var(--border);
    border-radius:14px;
    cursor:zoom-in;
    transition:transform .18s ease, border-color .18s ease;
  }
  .qr-card:hover{
    transform:translateY(-2px);
    border-color:var(--rose);
  }
  .qr-card img{
    width:64px;height:64px;display:block;
    border-radius:6px;
  }
  .qr-label{
    font-size:13px;
    line-height:1.35;
    color:var(--ink-2);
  }
  .qr-label strong{
    display:block;
    color:var(--ink);
    font-weight:600;
    font-size:14px;
    margin-bottom:2px;
  }

  /* ───────── QR lightbox modal ───────── */
  .qr-modal{
    position:fixed;
    inset:0;
    background:rgba(42,24,16,.78);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:100;
    padding:24px;
    cursor:zoom-out;
    animation:fadeIn .2s ease;
  }
  .qr-modal.is-open{display:flex}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  .qr-modal-inner{
    background:#fff;
    border-radius:20px;
    padding:32px 32px 28px;
    max-width:420px;
    width:100%;
    text-align:center;
    cursor:default;
    animation:popIn .25s cubic-bezier(.2,.9,.3,1.1);
  }
  @keyframes popIn{from{transform:scale(.92);opacity:0}to{transform:scale(1);opacity:1}}
  .qr-modal-inner img{
    width:100%;
    max-width:340px;
    height:auto;
    display:block;
    margin:0 auto 18px;
    border-radius:8px;
  }
  .qr-modal-inner h4{
    font-family:var(--serif);
    font-weight:500;
    font-size:22px;
    margin:0 0 6px;
    color:var(--ink);
  }
  .qr-modal-inner p{
    font-size:14px;
    color:var(--ink-2);
    margin:0 0 18px;
  }
  .qr-modal-inner .url{
    font-family:var(--mono);
    font-size:12px;
    color:var(--muted);
    word-break:break-all;
  }
  .qr-close{
    position:absolute;
    top:18px;right:22px;
    background:none;border:0;
    color:#fff;
    font-size:32px;
    line-height:1;
    cursor:pointer;
    padding:8px;
    opacity:.8;
  }
  .qr-close:hover{opacity:1}

  /* ───────── Sections ───────── */
  section{padding:var(--pad-y) 0}
  .sec{position:relative}
  .sec-h{
    font-family:var(--serif);
    font-weight:400;
    font-size:44px;
    line-height:1.15;
    text-align:center;
    margin:0 0 16px;
    letter-spacing:-0.01em;
    color:var(--ink);
  }
  .sec-h em{
    font-style:italic;
    font-weight:500;
    color:var(--terra);
  }
  .sec-sub{
    text-align:center;
    font-size:17px;
    color:var(--ink-2);
    max-width:560px;
    margin:0 auto 64px;
    line-height:1.55;
  }

  /* ───────── Benefits grid ───────── */
  .grid{
    display:grid;
    grid-template-columns:repeat(5, 1fr);
    gap:14px;
  }
  .card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:14px;
    padding:30px 26px;
    display:flex;
    flex-direction:column;
    gap:18px;
    transition:transform .25s ease, border-color .25s ease;
  }
  .card:hover{
    transform:translateY(-4px);
    border-color:var(--rose);
  }
  .card .icon-wrap{
    width:44px;height:44px;
    border-radius:12px;
    background:var(--bg-soft);
    display:flex;align-items:center;justify-content:center;
    color:var(--terra);
  }
  .card .icon-wrap svg{width:22px;height:22px;display:block}
  .card h3{
    font-family:var(--sans);
    font-weight:600;
    font-size:17px;
    line-height:1.3;
    margin:0;
    color:var(--ink);
  }
  .card p{
    font-size:14.5px;
    line-height:1.6;
    color:var(--ink-2);
    margin:0;
  }

  /* ───────── Chat mock (Section 3) ───────── */
  .chat-wrap{
    position:relative;
    max-width:440px;
    margin:0 auto;
  }
  /* warm halo behind the phone */
  .chat-wrap::before{
    content:"";
    position:absolute;
    inset:-40px -60px;
    background:radial-gradient(closest-side, rgba(232,155,142,.35), transparent 70%);
    z-index:0;
    border-radius:50%;
  }
  .chat{
    position:relative;
    z-index:1;
    background:#FAFAFA;
    border-radius:28px;
    overflow:hidden;
    border:1px solid var(--border);
  }
  .chat-head{
    display:flex;align-items:center;gap:12px;
    padding:16px 18px;
    background:#fff;
    border-bottom:1px solid #ECECEC;
  }
  .avatar{
    width:38px;height:38px;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, #E8C898 0%, #B08D57 55%, #7E5F33 100%);
    flex-shrink:0;
  }
  .chat-name{
    font-size:14px;font-weight:600;color:var(--ink);
    line-height:1.2;
  }
  .chat-status{
    display:flex;align-items:center;gap:6px;
    font-size:12px;color:var(--muted);
    margin-top:2px;
  }
  .dot-active{
    width:7px;height:7px;border-radius:50%;
    background:#2DD36F;
    display:inline-block;
  }
  .chat-body{
    padding:18px 14px 22px;
    display:flex;flex-direction:column;gap:8px;
  }
  .msg{
    max-width:80%;
    padding:10px 14px;
    font-size:14px;
    line-height:1.45;
    border-radius:18px;
    word-wrap:break-word;
  }
  .msg.bot{
    align-self:flex-start;
    background:#fff;
    color:var(--ink);
    border:1px solid #EFEFEF;
    border-bottom-left-radius:6px;
  }
  .msg.client{
    align-self:flex-end;
    background:linear-gradient(135deg, #F58EA7 0%, #C66EE0 50%, #8E5BE0 100%);
    color:#fff;
    border-bottom-right-radius:6px;
  }

  .final-cta{
    text-align:center;
    margin-top:72px;
  }
  .final-cta .reassure{
    display:block;
    margin-top:14px;
    font-size:14px;
    color:var(--muted);
  }

  /* ───────── Footer ───────── */
  footer{
    border-top:1px solid var(--border);
  }
  .foot{
    display:flex;align-items:center;justify-content:space-between;
    min-height:60px;
    padding:18px 32px;
    max-width:var(--maxw);
    margin:0 auto;
    font-size:14px;
    color:var(--ink-2);
  }
  .foot .brand{
    font-family:var(--serif);
    font-size:17px;
    color:var(--ink);
    letter-spacing:0.01em;
  }

  /* ───────── Responsive ───────── */
  @media (max-width: 900px){
    :root{--pad-y:72px}
    .topbar{inset:20px 0 auto 0}
    .wrap{padding:0 20px}
    .hero{padding:120px 0 64px; min-height:auto}
    h1.hero-h{font-size:40px}
    .hero-sub{font-size:17px;margin-bottom:32px}
    .sec-h{font-size:30px}
    .sec-sub{font-size:15px;margin-bottom:40px}
    .grid{grid-template-columns:1fr;gap:12px}
    .card{padding:24px}
    .btn{font-size:16px;padding:18px 30px}
    .chat-wrap{max-width:100%}
    .foot{flex-direction:column;gap:8px;text-align:center;padding:20px}
    .final-cta{margin-top:56px}
    /* hide some background bubbles on mobile to keep it light */
    .b3,.b6{display:none}
    .bg-bubble{max-width:200px;font-size:12.5px}
    .b1{top:8%;right:-30px;max-width:170px}
    .b2{top:18%;right:8%;max-width:180px}
    .b4{bottom:14%;left:-20px;max-width:170px}
    .b5{bottom:4%;left:8%;max-width:190px}
  }
</style>
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <div class="wrap">
      <div class="wordmark">MANEVISION</div>
      <nav class="lang" aria-label="Language">
        <button data-lang="pl" class="is-active">PL</button>
        <button data-lang="en">EN</button>
        <button data-lang="ru">RU</button>
      </nav>
    </div>
  </div>

  <!-- ───────── Hero ───────── -->
  <section class="hero">

    <!-- Decorative chat fragments in the background -->
    <div class="bg-chat" aria-hidden="true">
      <div class="bg-bubble cli b1" data-i18n="bg1"></div>
      <div class="bg-bubble bot b2" data-i18n="bg2"></div>
      <div class="bg-bubble cli b3" data-i18n="bg3"></div>
      <div class="bg-bubble bot b4" data-i18n="bg4"></div>
      <div class="bg-bubble cli b5" data-i18n="bg5"></div>
      <div class="bg-bubble bot b6" data-i18n="bg6"></div>
    </div>

    <div class="wrap">
      <div class="hero-inner">
        <span class="eyebrow"><span class="live-dot"></span><span data-i18n="eyebrow"></span></span>
        <h1 class="hero-h" data-i18n="hero_h"></h1>
        <p class="hero-sub" data-i18n="hero_sub">Ваша клиника отвечает за 10 секунд. В любое время. В любом мессенджере или соцсети.</p>
        <div class="cta-row">
          <a class="btn" href="https://ig.me/m/manebotdemo_beauty" target="_blank" rel="noopener noreferrer">
            <span data-i18n="cta_hero"></span><span class="arrow">→</span>
          </a>
          <button class="qr-card" type="button" id="qrTrigger" aria-label="Show QR code">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=240x240&margin=2&data=https%3A%2F%2Fig.me%2Fm%2Fmanebotdemo_beauty" alt="QR code to ig.me/m/manebotdemo_beauty">
            <span class="qr-label">
              <strong data-i18n="qr_title"></strong>
              <span data-i18n="qr_sub"></span>
            </span>
          </button>
        </div>
        <p class="micro" data-i18n="micro"></p>
      </div>
    </div>
  </section>

  <!-- ───────── Benefits ───────── -->
  <section class="sec">
    <div class="wrap">
      <h2 class="sec-h" data-i18n="sec_benefits"></h2>
      <p class="sec-sub" data-i18n="sec_benefits_sub"></p>
      <div class="grid">

        <article class="card">
          <span class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span>
          <h3 data-i18n="c1h"></h3>
          <p data-i18n="c1b"></p>
        </article>

        <article class="card">
          <span class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>
          <h3 data-i18n="c2h"></h3>
          <p data-i18n="c2b"></p>
        </article>

        <article class="card">
          <span class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg></span>
          <h3 data-i18n="c3h"></h3>
          <p data-i18n="c3b"></p>
        </article>

        <article class="card">
          <span class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><polyline points="9 16 11 18 15 14"/></svg></span>
          <h3 data-i18n="c4h"></h3>
          <p data-i18n="c4b"></p>
        </article>

        <article class="card">
          <span class="icon-wrap"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></span>
          <h3 data-i18n="c5h"></h3>
          <p data-i18n="c5b"></p>
        </article>

      </div>
    </div>
  </section>

  <!-- ───────── Live dialogue + final CTA ───────── -->
  <section class="sec" style="background:linear-gradient(180deg, transparent, rgba(245,230,211,.4) 40%, transparent);">
    <div class="wrap">
      <h2 class="sec-h" data-i18n="sec_chat"></h2>
      <p class="sec-sub" data-i18n="sec_chat_sub"></p>

      <div class="chat-wrap">
        <div class="chat" role="img" aria-label="Instagram chat preview">
          <div class="chat-head">
            <div class="avatar" aria-hidden="true"></div>
            <div>
              <div class="chat-name">@manebotdemo_beauty</div>
              <div class="chat-status"><span class="dot-active"></span><span data-i18n="active_now"></span></div>
            </div>
          </div>
          <div class="chat-body">
            <div class="msg client" data-i18n="m1"></div>
            <div class="msg bot"    data-i18n="m2"></div>
            <div class="msg client" data-i18n="m3"></div>
            <div class="msg bot"    data-i18n="m4"></div>
            <div class="msg client" data-i18n="m5"></div>
            <div class="msg bot"    data-i18n="m6"></div>
          </div>
        </div>
      </div>

      <div class="final-cta">
        <a class="btn" href="https://ig.me/m/manebotdemo_beauty" target="_blank" rel="noopener noreferrer">
          <span data-i18n="cta_final"></span><span class="arrow">→</span>
        </a>
        <span class="reassure" data-i18n="reassure"></span>
      </div>
